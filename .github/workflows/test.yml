name: pyfhd pytest

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest] #, windows-latest] add back after healpy replaced
        uv-options: ["--frozen"]
        include:
          - uv-options: "--upgrade"
            os: ubuntu-latest
            python-version: "3.13"
          - uv-options: "--resolution lowest-direct"
            os: ubuntu-latest
            python-version: "3.11"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6.3
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync ${{ matrix.uv-options }} --all-extras --dev

      - name: Install pyuvdata fhd_beam_decompose branch
        run: |
          cd ../
          git clone -b fhd_beam_decompose https://github.com/RadioAstronomySoftwareGroup/pyuvdata.git
          cd pyfhd
          uv pip install --no-deps ../pyuvdata

      - name: Environment Info
        run: |
          uv pip list

      - name: Cache test data
        id: cache-test-data
        uses: actions/cache@v4
        with:
          path: src/pyfhd/resources/test_data/pyfhd_test_data.zip
          key: test-data-${{ hashFiles('**/pyfhd_test_data.zip') }}
          restore-keys: test-data-

      - name: Download the test data from Zenodo
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        run: |
          wget -O src/pyfhd/resources/test_data/pyfhd_test_data.zip https://zenodo.org/records/15687722/files/pyfhd_test_data.zip?download=1

      - name: Unzip the test data
        run: |
          unzip src/pyfhd/resources/test_data/pyfhd_test_data.zip -d src/pyfhd/resources/test_data

      - name: Run tests
        run: |
          uv run --no-sync coverage run --branch --source=pyfhd -m pytest -m github_actions --html=pyfhd_report.html --self-contained-html
          uv run --no-sync coverage xml  -o ./coverage.xml

      - name: check coverage report
        run: |
          ls
          cat coverage.xml

      - uses: codecov/codecov-action@v5
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }} #required
          files: ./coverage.xml #optional

      - name: Get coverage HTML report
        if: (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && matrix.uv-options == '--frozen')
        run: uv run coverage html --directory=coverage_html_report --title="pyfhd GitHub Actions Coverage Report"

      - name: Change Title of the Unit Test Report
        if: (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && matrix.uv-options == '--frozen')
        run: |
          sed -i 's/<h1 id="title">pyfhd_report.html<\/h1>/<h1 id="title">pyfhd GitHub Actions Unit Test Report<\/h1>/' pyfhd_report.html
          sed -i 's/<title id="head-title">pyfhd_report.html<\/title>/<title id="head-title">pyfhd GitHub Actions Unit Test Report<\/title>/' pyfhd_report.html

      - name: Upload Unit Test HTML Report
        if: (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && matrix.uv-options == '--frozen')
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: pyfhd_report.html

      - name: Upload Coverage HTML Report Directory
        if: (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && matrix.uv-options == '--frozen')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: coverage_html_report/

  deploy-reports:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download unit test report
        uses: actions/download-artifact@v4
        with:
          name: unit-test-report
          path: reports

      - name: Download coverage HTML report
        uses: actions/download-artifact@v4
        with:
          name: coverage-html-report
          path: reports/coverage_html_report

      - name: Prepare pages content
        run: |
          mkdir -p gh-pages
          cp reports/pyfhd_report.html gh-pages/
          cp -R reports/coverage_html_report gh-pages/coverage_html_report

      - name: Deploy reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
